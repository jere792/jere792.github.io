<div class="home-container">

  <section class="hero-section">

    <div class="hero-grid">

      <div class="hero-content">
        <h1 class="hero-name">
          <span class="typed-text">{{ typedText }}</span>
          <span class="cursor">|</span>
        </h1>
        <p class="hero-role">{{ userInfo.role }}</p>
        <p class="hero-description">
          {{ Description }}
        </p>

        <div class="cta-buttons">
          <button pButton 
                  label="Ver Proyectos" 
                  icon="pi pi-arrow-right" 
                  iconPos="right" 
                  class="p-button-raised"
                  (click)="navigateToProjects()"></button>
          
          <button pButton 
                  label="Contáctame" 
                  icon="pi pi-envelope" 
                  class="p-button-outlined"
                  (click)="navigateToContact()"></button>
        </div>

        <div class="social-links">
          <a href="https://github.com/jere792" target="_blank" class="social-icon">
            <i class="devicon-github-original"></i>
          </a>
          <a href="https://linkedin.com" target="_blank" class="social-icon">
            <i class="pi pi-linkedin"></i>
          </a>
          <a href="mailto:jeremyar792@gmail.com" class="social-icon">
            <i class="pi pi-envelope"></i>
          </a>
        </div>
      </div>

      <div class="hero-image">
        <div class="image-container">
          <img [src]="image" alt="Jeremy Anton" class="profile-image">
        </div>
      </div>
    </div>
  </section>

  <section class="tech-stack-section">
    <h2 class="section-heading">
      <i class="pi pi-code"></i>
      Tech Stack
    </h2>
    <div class="tech-grid">
      <div class="tech-card" *ngFor="let tech of technologies">
        <div class="tech-icon">
          <i [class]="tech.icon"></i>
        </div>
        <span class="tech-name">{{ tech.name }}</span>
      </div>
    </div>
  </section>
</div>
