<section class="github-section">

  <h2 class="section-heading">
    <i class="devicon-github-original"></i>
    GitHub Activity
  </h2>

  <div class="loading-state" *ngIf="loading">
    <span class="terminal-prompt">$ fetching github data</span>
    <span class="blink">_</span>
  </div>

  <div class="error-state" *ngIf="error && !loading">
    <i class="pi pi-exclamation-triangle"></i>
    No se pudo conectar con la API de GitHub
  </div>

  <div class="github-content" *ngIf="!loading && !error">

    <div class="stats-card" *ngIf="profile">
      <div class="stat">
        <span class="stat-value">{{ profile.public_repos }}</span>
        <span class="stat-label">repos</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value">{{ profile.followers }}</span>
        <span class="stat-label">followers</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value">{{ profile.following }}</span>
        <span class="stat-label">following</span>
      </div>
    </div>

    <div class="contrib-card">
      <span class="card-label">
        <i class="pi pi-chart-bar"></i>
        Contributions
      </span>
      <img [src]="contribUrl"
           alt="GitHub contribution graph"
           class="contrib-img"
           loading="lazy" />
    </div>

  </div>

</section>
