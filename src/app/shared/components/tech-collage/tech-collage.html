<div class="collage-host" (mousemove)="onMouseMove($event)">

  <div class="bg-grid"></div>
  <div class="bg-vignette"></div>

  <div class="scene" [ngStyle]="getSceneStyle()">

    <div class="cross-lines"></div>

    <div class="circles">
      <div class="circle" *ngFor="let c of circles"></div>
    </div>

    <div class="center-node">
      <div class="cn-dot"></div>
    </div>

    <div
      *ngFor="let card of cards; trackBy: trackByName"
      class="card"
      [class.xl]="card.size === 'xl'"
      [class.lg]="card.size === 'lg'"
      [class.md]="card.size === 'md'"
      [class.sm]="card.size === 'sm'"
      [class.mobile]="isMobile"
      [ngStyle]="getCardStyle(card)"
    >
      <i [class]="card.icon"></i>
      <span class="card-name" *ngIf="!isMobile">{{ card.name }}</span>
    </div>

  </div>
</div>
